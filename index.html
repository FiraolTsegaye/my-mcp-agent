<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Guard Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 8px; }
        button { padding: 10px 15px; font-weight: bold; cursor: pointer; }
        #output { margin-top: 20px; padding: 15px; background: #f9f9f9; border-left: 4px solid #007bff; }
        .highlight { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🛡️ Token Guard Dashboard</h2>
    <p>Simulate sending traffic to the AI API:</p>
    
    <textarea id="promptInput" placeholder="Paste a very long paragraph here..."></textarea>
    <button onclick="sendTraffic()">Send Traffic Through Guard</button>

    <div id="output">Waiting for traffic...</div>

    <script>
        async function sendTraffic() {
            const input = document.getElementById('promptInput').value;
            const outputBox = document.getElementById('output');

            if (!input) {
                outputBox.innerHTML = "⚠️ Please enter some text.";
                return;
            }

            outputBox.innerHTML = "⏳ Analyzing prompt...";

            try {
                const response = await fetch('/guard', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: input })
                });

                const data = await response.json();

                if (data.status === "optimized") {
                    outputBox.innerHTML = `
                        <strong>Status:</strong> ⚠️ Bloat Detected & Optimized<br><br>
                        <strong>Original Length:</strong> ${data.original_length} characters<br>
                        <strong>New Length:</strong> ${data.new_length} characters<br>
                        <strong>Money Saved:</strong> <span class="highlight">${data.savings_percent}% less tokens used!</span><br><br>
                        <strong>Optimized Prompt Sent to API:</strong><br>
                        <em>"${data.final_prompt}"</em>
                    `;
                } else if (data.status === "passed") {
                    outputBox.innerHTML = `
                        <strong>Status:</strong> <span class="highlight">✅ Efficient</span><br><br>
                        Prompt was short enough. Passed directly to API without changes.
                    `;
                } else {
                    outputBox.innerHTML = "❌ Error processing request.";
                }
            } catch (error) {
                outputBox.innerHTML = "❌ Connection failed. Is the server running?";
            }
        }
    </script>
</body>
</html>
