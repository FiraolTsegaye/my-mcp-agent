<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Guard v3 — Hackathon Agent</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* New styles for Dynatrace tools */
    .dot-mcp { background: #5b21b6; color: #ddd6fe; }
    .tool-mcp { color: #a78bfa; }
    .mcp-output-box {
      margin-top: 8px; background: #0a0c12; border: 1px solid #1e2235;
      border-radius: 6px; padding: 8px; font-family: monospace;
      font-size: 0.75rem; color: #a5b4fc; max-height: 150px; overflow-y: auto;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <span style="font-size:1.5rem">🛡️</span>
    <h1>Token Guard <span>v3</span></h1>
    <span class="version-badge">Hackathon — Gemini + Dynatrace</span>
  </header>

  <!-- Input -->
  <div class="card">
    <div class="card-label">Prompt Input</div>
    <textarea id="promptInput" placeholder="Enter a prompt... the agent will use Dynatrace observability to analyze it."></textarea>
    <div class="btn-row">
      <button id="sendBtn" onclick="sendToAgent()">▶ Run Agent</button>
      <button class="btn-ghost" onclick="document.getElementById('promptInput').value=''">Clear</button>
    </div>
  </div>

  <!-- Result -->
  <div class="card" id="resultCard">
    <div class="card-label">Agent Decision</div>
    <div id="resultInner"></div>
  </div>

  <!-- Agent Trace -->
  <div class="card" id="traceCard">
    <div class="card-label">🧠 Agent Reasoning Trace</div>
    <div class="trace-chain" id="traceChain"></div>
  </div>

</div>

<script>
  async function sendToAgent() {
    const input   = document.getElementById('promptInput').value.trim();
    const btn     = document.getElementById('sendBtn');
    const resCard = document.getElementById('resultCard');
    const traCard = document.getElementById('traceCard');

    if (!input) return;

    btn.disabled      = true;
    btn.innerHTML     = '<span class="pulse"></span> Agent thinking…';
    resCard.style.display = 'none';
    traCard.style.display = 'none';

    try {
      const res  = await fetch('/guard', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: input })
      });
      const data = await res.json();

      renderResult(data);
      renderTrace(data.agent_steps || []);
      resCard.style.display = 'block';
      traCard.style.display = 'block';
    } catch (err) {
      alert('Error reaching agent.');
    } finally {
      btn.disabled  = false;
      btn.innerHTML = '▶ Run Agent';
    }
  }

  function renderResult(d) {
    let html = `<div class="stat-row">`;
    html += `<div class="stat"><div class="label">Original</div><div class="val">${d.original_length} chars</div></div>`;
    html += `<div class="stat"><div class="label">New</div><div class="val">${d.new_length} chars</div></div>`;
    html += `<div class="stat"><div class="label">Saved</div><div class="val savings">${d.savings_percent}%</div></div>`;
    html += `</div>`;
    html += `<div class="final-prompt-box">"${d.final_prompt}"</div>`;
    document.getElementById('resultInner').innerHTML = html;
  }

  function renderTrace(steps) {
    const chain = document.getElementById('traceChain');
    chain.innerHTML = steps.map((step, i) => {
      const isInternal = ['analyze_prompt', 'optimize_prompt', 'approve_prompt'].includes(step.tool);
      const dotClass = isInternal ? `dot-${step.tool.split('_')[0]}` : 'dot-mcp';
      const toolClass = isInternal ? `tool-${step.tool.split('_')[0]}` : 'tool-mcp';
      const icon = isInternal ? '⚙️' : '📡';
      const isLast = i === steps.length - 1;

      let outputHtml = '';
      if (!isInternal) {
        outputHtml = `<div class="mcp-output-box">${JSON.stringify(step.output, null, 2)}</div>`;
      }

      return `
        <div class="trace-step">
          <div class="step-line">
            <div class="step-dot ${dotClass}">${icon}</div>
            ${!isLast ? '<div class="step-connector"></div>' : ''}
          </div>
          <div class="step-body">
            <div class="step-tool-name ${toolClass}">Step ${i+1}: ${step.tool}</div>
            <div class="step-kv">
               ${Object.entries(step.input).map(([k,v]) => `<span class="kv-pill"><strong>${k}</strong>: ${v}</span>`).join('')}
            </div>
            ${outputHtml}
          </div>
        </div>`;
    }).join('');
  }
</script>
</body>
</html>
